services:
  db_task_manager:
    image: postgres:15
    container_name: postgres_task_manager
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task_manager_net

  pgadmin_task_manager:
    image: dpage/pgadmin4
    container_name: pgadmin_task_manager
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5055:80"
    depends_on:
      - db_task_manager
    networks:
      - task_manager_net

  backend_task_manager:
    build:
      context: ./backend-tareas-priorizadas
      dockerfile: Dockerfile
    container_name: backend_task_manager
    restart: always
    ports:
      - "8000:8000"
    environment:

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_task_manager:5432/${POSTGRES_DB}
   
      DB_HOST: db_task_manager
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      DEBUG: ${DEBUG}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db_task_manager:
        condition: service_healthy
    networks:
      - task_manager_net

  frontend_task_manager:
    build:
      context: ./frontend-tareas-priorizadas
      dockerfile: Dockerfile
    container_name: frontend_task_manager
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend_task_manager
    networks:
      - task_manager_net

volumes:
  postgres_data:

networks:
  task_manager_net:
    driver: bridge