services:
  db_task_manager:
    image: postgres:15
    container_name: postgres_task_manager
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - task_manager_net

  pgadmin_task_manager:
    image: dpage/pgadmin4
    container_name: pgadmin_task_manager
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5055:80"
    depends_on:
      - db_task_manager
    networks:
      - task_manager_net

volumes:
  postgres_data:

networks:
  task_manager_net:
    driver: bridge